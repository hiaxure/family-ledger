<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>家庭账本</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
/* =====================================================
   iCost Style — Family Ledger v4
   Deep dark theme, vibrant gradients, premium feel
   ===================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0D0D14;
  --bg2:         #13131E;
  --card:        #1A1A2E;
  --card2:       #202035;
  --border:      rgba(255,255,255,0.07);
  --text1:       #FFFFFF;
  --text2:       rgba(255,255,255,0.55);
  --text3:       rgba(255,255,255,0.28);
  --income:      #00D4AA;
  --expense:     #FF6B6B;
  --grad:        linear-gradient(135deg,#667eea,#764ba2);
  --grad2:       linear-gradient(135deg,#f093fb,#f5576c);
  --grad-income: linear-gradient(135deg,#00D4AA,#00A86B);
  --grad-expense:linear-gradient(135deg,#FF6B6B,#ee0979);
  --tab-h:       60px;
  --safe-b:      env(safe-area-inset-bottom,0px);
  --t:           0.22s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"] {
  --bg:    #F0F2FF;
  --bg2:   #E8EAFF;
  --card:  #FFFFFF;
  --card2: #F5F5FF;
  --border:rgba(0,0,0,0.07);
  --text1: #1A1A2E;
  --text2: rgba(26,26,46,0.55);
  --text3: rgba(26,26,46,0.3);
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --bg:#F0F2FF; --bg2:#E8EAFF; --card:#FFFFFF; --card2:#F5F5FF;
    --border:rgba(0,0,0,0.07); --text1:#1A1A2E;
    --text2:rgba(26,26,46,0.55); --text3:rgba(26,26,46,0.3);
  }
}

html,body { height:100%; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  background:var(--bg); color:var(--text1); overflow:hidden;
  -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; }

/* ── Password Screen ── */
#pw-screen {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:20000; padding:32px;
}
#pw-screen.hidden { display:none!important; }
.pw-logo { width:80px; height:80px; border-radius:24px; background:var(--grad);
  display:flex; align-items:center; justify-content:center; font-size:40px;
  margin-bottom:24px; box-shadow:0 12px 40px rgba(102,126,234,0.5); }
.pw-title { font-size:24px; font-weight:700; margin-bottom:6px; }
.pw-sub { font-size:14px; color:var(--text2); margin-bottom:32px; }
.pw-input { width:100%; max-width:320px; background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:14px 18px; font-size:17px; color:var(--text1);
  text-align:center; letter-spacing:4px; outline:none; margin-bottom:16px; }
.pw-input::placeholder { letter-spacing:0; color:var(--text3); }
.pw-btn { width:100%; max-width:320px; background:var(--grad); border:none; border-radius:14px;
  padding:15px; font-size:17px; font-weight:600; color:#fff; cursor:pointer;
  box-shadow:0 4px 20px rgba(102,126,234,0.4); transition:transform var(--t),opacity var(--t); }
.pw-btn:active { transform:scale(0.97); opacity:0.88; }
.pw-err { font-size:13px; color:var(--expense); margin-top:10px; min-height:18px; }

/* ── Welcome Screen ── */
#welcome-screen {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:19000; padding:32px;
}
#welcome-screen.hidden { display:none!important; }
.wl-logo { width:88px; height:88px; border-radius:26px; background:var(--grad);
  display:flex; align-items:center; justify-content:center; font-size:48px;
  margin-bottom:20px; box-shadow:0 14px 44px rgba(102,126,234,0.5); }
.wl-title { font-size:26px; font-weight:700; margin-bottom:6px; }
.wl-sub { font-size:15px; color:var(--text2); margin-bottom:44px; }
.user-cards { display:flex; gap:16px; width:100%; max-width:340px; }
.user-card { flex:1; background:var(--card); border-radius:20px; padding:28px 16px;
  display:flex; flex-direction:column; align-items:center; gap:12px; cursor:pointer;
  border:2px solid var(--border); transition:all var(--t); user-select:none; }
.user-card:active { transform:scale(0.95); }
.user-card-avatar { width:64px; height:64px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:36px; }
.user-card-name { font-size:16px; font-weight:600; }

/* ── Loading ── */
#loading { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column;
  align-items:center; justify-content:center; z-index:18000; transition:opacity 0.3s; }
#loading.hidden { display:none!important; }
.ld-logo { width:72px; height:72px; border-radius:20px; background:var(--grad);
  display:flex; align-items:center; justify-content:center; font-size:40px;
  margin-bottom:16px; box-shadow:0 10px 36px rgba(102,126,234,0.45); }
.ld-dots { display:flex; gap:6px; margin-top:20px; }
.ld-dots span { width:8px; height:8px; border-radius:50%; background:var(--grad);
  background:linear-gradient(135deg,#667eea,#764ba2);
  animation:ldBounce 1.2s ease infinite; }
.ld-dots span:nth-child(2){animation-delay:.2s} .ld-dots span:nth-child(3){animation-delay:.4s}
@keyframes ldBounce{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}

/* ── App Shell ── */
#app { display:flex; flex-direction:column; height:100vh; height:100dvh; overflow:hidden; }

/* ── Tab Bar ── */
#tab-bar {
  display:flex; align-items:center;
  height:calc(var(--tab-h) + var(--safe-b));
  background:var(--card); border-top:1px solid var(--border);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  flex-shrink:0; z-index:100;
  padding-bottom:var(--safe-b);
}
.tab-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; border:none; background:transparent; cursor:pointer; padding:8px 0;
  color:var(--text3); transition:color var(--t); font-size:10px; font-weight:500; }
.tab-item.active { color:transparent;
  background:var(--grad); -webkit-background-clip:text; background-clip:text; }
.tab-item svg { width:22px; height:22px; transition:transform var(--t); }
.tab-item.active svg { transform:scale(1.1); }
/* Center add button */
.tab-add-btn { flex:0 0 60px; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:3px; border:none; background:transparent; cursor:pointer;
  padding:0; color:var(--text2); font-size:10px; font-weight:500; }
.tab-add-circle { width:50px; height:50px; border-radius:50%; background:var(--grad);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 20px rgba(102,126,234,0.5); margin-bottom:2px;
  transition:transform var(--t); font-size:26px; color:#fff; }
.tab-add-btn:active .tab-add-circle { transform:scale(0.92); }

/* ── Content Area ── */
#content-area { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* ── Hero Card ── */
.hero-card {
  background:var(--grad); padding:28px 20px 24px;
  padding-top:calc(28px + env(safe-area-inset-top,0px));
  position:relative; overflow:hidden;
}
.hero-card::before { content:''; position:absolute; top:-40px; right:-40px;
  width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,0.08); }
.hero-card::after { content:''; position:absolute; bottom:-60px; left:-20px;
  width:140px; height:140px; border-radius:50%; background:rgba(255,255,255,0.06); }
.hero-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.hero-month-label { font-size:13px; color:rgba(255,255,255,0.7); font-weight:500; }
.hero-sync { display:flex; align-items:center; gap:5px; font-size:12px; color:rgba(255,255,255,0.6); }
.sync-dot { width:6px; height:6px; border-radius:50%; background:#ccc; }
.sync-dot.synced  { background:#00D4AA; }
.sync-dot.syncing { background:#FFD60A; animation:syncPulse 1s infinite; }
.sync-dot.offline { background:#FF6B6B; }
@keyframes syncPulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero-label { font-size:14px; color:rgba(255,255,255,0.75); margin-bottom:4px; }
.hero-amount { font-size:44px; font-weight:700; color:#fff; letter-spacing:-1px; margin-bottom:20px;
  line-height:1; text-shadow:0 2px 12px rgba(0,0,0,0.2); }
.hero-stats { display:flex; gap:0; background:rgba(255,255,255,0.12);
  border-radius:14px; padding:14px 0; backdrop-filter:blur(10px); }
.hero-stat { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
.hero-stat + .hero-stat { border-left:1px solid rgba(255,255,255,0.2); }
.hero-stat-label { font-size:12px; color:rgba(255,255,255,0.65); }
.hero-stat-val { font-size:16px; font-weight:700; color:#fff; }
.hero-stat-val.income  { color:#A0FFE6; }
.hero-stat-val.expense { color:#FFB3B3; }

/* ── Account Scroll ── */
.section-title { padding:16px 16px 8px; font-size:13px; font-weight:600;
  color:var(--text2); letter-spacing:0.3px; }
.accounts-scroll { display:flex; gap:10px; padding:0 16px 16px; overflow-x:auto;
  -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.accounts-scroll::-webkit-scrollbar { display:none; }
.acct-card { flex-shrink:0; width:130px; background:var(--card); border-radius:16px;
  padding:14px 12px; cursor:pointer; border:2px solid transparent;
  transition:all var(--t); }
.acct-card.active { border-color:rgba(102,126,234,0.6); background:var(--card2); }
.acct-card:active { transform:scale(0.96); }
.acct-icon { font-size:24px; margin-bottom:8px; }
.acct-name { font-size:12px; color:var(--text2); margin-bottom:4px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.acct-bal { font-size:15px; font-weight:700; }

/* ── Filter Bar ── */
.filter-bar { display:flex; align-items:center; gap:8px; padding:0 16px 12px; overflow-x:auto;
  scrollbar-width:none; }
.filter-bar::-webkit-scrollbar { display:none; }
.filter-sel { background:var(--card); border:1px solid var(--border); border-radius:20px;
  padding:6px 12px; font-size:13px; color:var(--text1); outline:none; cursor:pointer;
  white-space:nowrap; flex-shrink:0; }
.filter-count { font-size:12px; color:var(--text3); white-space:nowrap; flex-shrink:0; }

/* ── Transaction List ── */
.list-section { background:var(--card); border-radius:16px; margin:0 16px 12px; overflow:hidden; }
.list-section-header { display:flex; justify-content:space-between; align-items:center;
  padding:12px 16px 8px; border-bottom:1px solid var(--border); }
.list-date { font-size:13px; font-weight:600; color:var(--text2); }
.list-day-summary { display:flex; gap:8px; font-size:13px; font-weight:600; }
.day-in  { color:var(--income); }
.day-out { color:var(--expense); }
.tx-row { display:flex; align-items:center; gap:12px; padding:12px 16px;
  cursor:pointer; transition:background var(--t); }
.tx-row:active { background:var(--card2); }
.tx-row + .tx-row { border-top:1px solid var(--border); }
.tx-icon { width:42px; height:42px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:20px; flex-shrink:0; }
.tx-body { flex:1; min-width:0; }
.tx-cat  { font-size:15px; font-weight:600; color:var(--text1); }
.tx-meta { font-size:12px; color:var(--text3); margin-top:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-right { display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0; }
.tx-amt  { font-size:16px; font-weight:700; }
.tx-amt.income  { color:var(--income); }
.tx-amt.expense { color:var(--expense); }
.tx-rec  { font-size:11px; color:var(--text3); }

/* ── Empty State ── */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:60px 32px; gap:12px; }
.empty-icon { font-size:52px; }
.empty-title { font-size:17px; font-weight:600; color:var(--text2); }
.empty-sub   { font-size:14px; color:var(--text3); text-align:center; }

/* ── Stats Page ── */
.stats-hero { background:var(--grad); padding:20px 20px 24px;
  padding-top:calc(20px + env(safe-area-inset-top,0px)); }
.stats-range-tabs { display:flex; gap:8px; margin-bottom:16px; }
.stats-range-tab { background:rgba(255,255,255,0.15); border:none; border-radius:20px;
  padding:6px 16px; font-size:13px; font-weight:600; color:rgba(255,255,255,0.7);
  cursor:pointer; transition:all var(--t); }
.stats-range-tab.active { background:#fff; color:#764ba2; }
.stats-month-nav { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.stats-month-btn { background:rgba(255,255,255,0.15); border:none; border-radius:50%;
  width:30px; height:30px; font-size:16px; color:#fff; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:background var(--t); }
.stats-month-btn:active { background:rgba(255,255,255,0.3); }
.stats-month-label { font-size:15px; font-weight:600; color:#fff; }
.stats-trio { display:flex; gap:0; background:rgba(255,255,255,0.12);
  border-radius:14px; padding:14px 0; }
.stats-trio-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
.stats-trio-item + .stats-trio-item { border-left:1px solid rgba(255,255,255,0.2); }
.stats-trio-label { font-size:12px; color:rgba(255,255,255,0.65); }
.stats-trio-val { font-size:16px; font-weight:700; color:#fff; }
.stats-trio-val.green  { color:#A0FFE6; }
.stats-trio-val.red    { color:#FFB3B3; }

.chart-card { background:var(--card); border-radius:16px; margin:12px 16px; padding:16px; }
.chart-head { font-size:15px; font-weight:700; color:var(--text1); margin-bottom:14px;
  display:flex; align-items:center; gap:8px; }

/* Donut Chart */
.donut-wrap { display:flex; align-items:center; gap:20px; }
.donut-canvas-wrap { position:relative; flex-shrink:0; }
.donut-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  text-align:center; pointer-events:none; }
.donut-center-label { font-size:11px; color:var(--text3); }
.donut-center-val { font-size:15px; font-weight:700; color:var(--text1); }
.donut-legend { flex:1; display:flex; flex-direction:column; gap:8px; }
.legend-item { display:flex; align-items:center; gap:8px; }
.legend-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.legend-name { flex:1; font-size:13px; color:var(--text2);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.legend-pct { font-size:12px; color:var(--text3); }
.legend-amt { font-size:13px; font-weight:600; color:var(--text1); }

/* Rank list */
.rank-item { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.rank-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center;
  justify-content:center; font-size:18px; flex-shrink:0; }
.rank-body { flex:1; min-width:0; }
.rank-name { font-size:13px; color:var(--text1); font-weight:500; margin-bottom:4px; }
.rank-bar-track { height:4px; background:var(--card2); border-radius:2px; }
.rank-bar-fill  { height:100%; border-radius:2px; transition:width 0.5s ease; }
.rank-val { font-size:14px; font-weight:700; color:var(--expense); flex-shrink:0; }

/* Line chart SVG scroll */
.svg-scroll { overflow-x:auto; scrollbar-width:none; }
.svg-scroll::-webkit-scrollbar { display:none; }

/* ── Me Page ── */
.me-hero { background:var(--grad); padding:40px 20px 32px;
  padding-top:calc(40px + env(safe-area-inset-top,0px));
  display:flex; flex-direction:column; align-items:center; gap:10px; }
.me-avatar { width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,0.2);
  display:flex; align-items:center; justify-content:center; font-size:44px;
  border:3px solid rgba(255,255,255,0.4); }
.me-name  { font-size:20px; font-weight:700; color:#fff; }
.me-sub   { font-size:13px; color:rgba(255,255,255,0.7); }
.me-sync-badge { background:rgba(255,255,255,0.15); border-radius:20px; padding:4px 12px;
  font-size:12px; color:#fff; display:flex; align-items:center; gap:5px; }

.settings-group-title { padding:20px 16px 6px; font-size:12px; font-weight:600;
  color:var(--text3); letter-spacing:0.5px; text-transform:uppercase; }
.settings-group { background:var(--card); border-radius:16px; margin:0 16px 12px; overflow:hidden; }
.settings-row { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer;
  transition:background var(--t); }
.settings-row:active { background:var(--card2); }
.settings-row + .settings-row { border-top:1px solid var(--border); }
.settings-row-icon { width:34px; height:34px; border-radius:10px; display:flex;
  align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.settings-row-body { flex:1; }
.settings-row-title { font-size:15px; font-weight:500; color:var(--text1); }
.settings-row-sub   { font-size:12px; color:var(--text3); margin-top:1px; }
.settings-row-right { display:flex; align-items:center; gap:6px; }
.settings-chevron   { font-size:17px; color:var(--text3); }
.settings-val { font-size:14px; color:var(--text3); }
.settings-badge { background:var(--grad); color:#fff; font-size:11px; font-weight:600;
  border-radius:10px; padding:2px 8px; }
/* Theme toggle */
.theme-toggle { display:flex; gap:6px; }
.theme-btn { background:var(--card2); border:1px solid var(--border); border-radius:8px;
  padding:4px 10px; font-size:12px; color:var(--text2); cursor:pointer; transition:all var(--t); }
.theme-btn.active { background:var(--grad); color:#fff; border-color:transparent; }
/* Cat tags */
.cat-tag-wrap { padding:12px 16px; display:flex; flex-wrap:wrap; gap:8px; }
.cat-tag { display:inline-flex; align-items:center; gap:4px; background:var(--card2);
  border-radius:20px; padding:5px 10px; font-size:13px; color:var(--text1); }
.cat-tag.income-tag  .tag-dot { width:6px; height:6px; border-radius:50%; background:var(--income); display:inline-block; }
.cat-tag.expense-tag .tag-dot { width:6px; height:6px; border-radius:50%; background:var(--expense); display:inline-block; }
.tag-del { background:none; border:none; color:var(--text3); cursor:pointer;
  font-size:14px; line-height:1; padding:0 0 0 2px; }
.add-cat-row { display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--border); }
.add-cat-input { flex:1; background:var(--card2); border:1px solid var(--border); border-radius:10px;
  padding:8px 12px; font-size:14px; color:var(--text1); outline:none; }
.add-cat-btn { background:var(--grad); border:none; border-radius:10px; padding:8px 14px;
  font-size:14px; font-weight:600; color:#fff; cursor:pointer; }
/* Info rows */
.info-row { display:flex; justify-content:space-between; padding:10px 16px;
  font-size:14px; border-top:1px solid var(--border); }
.info-key { color:var(--text2); }
.info-val { color:var(--text1); font-weight:500; }

/* ── Bottom Sheet (Add TX) ── */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:500;
  display:flex; align-items:flex-end; }
.overlay.hidden { display:none!important; }
.bottom-sheet { width:100%; background:var(--card); border-radius:24px 24px 0 0;
  max-height:93vh; overflow-y:auto; -webkit-overflow-scrolling:touch;
  animation:slideUp 0.35s cubic-bezier(.4,0,.2,1); }
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.drag-handle { width:36px; height:4px; background:var(--border); border-radius:2px;
  margin:12px auto 0; }
.sheet-header { display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px 0; }
.sheet-title  { font-size:17px; font-weight:700; }
.sheet-close  { width:28px; height:28px; border-radius:50%; background:var(--card2);
  border:none; cursor:pointer; font-size:14px; color:var(--text2);
  display:flex; align-items:center; justify-content:center; }

/* Type Toggle */
.type-toggle { display:flex; gap:0; background:var(--card2); border-radius:14px;
  padding:3px; margin:14px 20px; }
.type-btn { flex:1; padding:9px; text-align:center; font-size:15px; font-weight:600;
  border:none; background:transparent; border-radius:11px; cursor:pointer;
  color:var(--text3); transition:all var(--t); }
.type-btn.active.income  { background:var(--grad-income); color:#fff; box-shadow:0 3px 12px rgba(0,212,170,0.4); }
.type-btn.active.expense { background:var(--grad-expense); color:#fff; box-shadow:0 3px 12px rgba(255,107,107,0.4); }

/* Amount Display */
.amt-display-wrap { padding:0 20px 16px; }
.amt-display { font-size:40px; font-weight:700; color:var(--text3); letter-spacing:-1px;
  min-height:52px; display:flex; align-items:baseline; gap:4px; }
.amt-display.has-val.income  { color:var(--income); }
.amt-display.has-val.expense { color:var(--expense); }
.amt-currency { font-size:22px; font-weight:700; }
.amt-cursor { width:2px; height:36px; background:currentColor; border-radius:1px;
  animation:blink 1s step-end infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Category Grid */
.cat-section { padding:0 20px 12px; }
.cat-section-label { font-size:13px; color:var(--text2); font-weight:600; margin-bottom:10px; }
.cat-scroll { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
.cat-scroll::-webkit-scrollbar { display:none; }
.cat-chip { display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer;
  flex-shrink:0; transition:transform var(--t); }
.cat-chip:active { transform:scale(0.9); }
.cat-chip-icon { width:48px; height:48px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:22px; border:2px solid transparent;
  transition:all var(--t); }
.cat-chip.sel .cat-chip-icon { border-color:#fff; transform:scale(1.1);
  box-shadow:0 4px 16px rgba(0,0,0,0.3); }
.cat-chip-name { font-size:11px; color:var(--text2); text-align:center;
  white-space:nowrap; max-width:50px; overflow:hidden; text-overflow:ellipsis; }
.cat-chip.sel .cat-chip-name { color:var(--text1); font-weight:600; }

/* Numpad */
.numpad { display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
  padding:0 16px 16px; }
.nk { background:var(--card2); border:none; border-radius:12px; padding:0;
  height:52px; font-size:20px; font-weight:600; color:var(--text1); cursor:pointer;
  transition:all var(--t); display:flex; align-items:center; justify-content:center; }
.nk:active { transform:scale(0.93); background:var(--border); }
.nk.nk-del { background:rgba(255,107,107,0.15); color:var(--expense); font-size:18px; }
.nk.nk-clear { background:rgba(255,107,107,0.1); color:var(--expense); font-size:14px; font-weight:600; }
.nk.nk-ok { grid-column:span 2; background:var(--grad);
  color:#fff; font-size:15px; font-weight:700; border-radius:12px;
  box-shadow:0 4px 16px rgba(102,126,234,0.4); }
.nk.nk-ok:active { transform:scale(0.97); }

/* Form Fields below numpad */
.form-section { padding:0 20px; }
.form-row { display:flex; align-items:center; gap:12px; padding:12px 0;
  border-top:1px solid var(--border); }
.form-label { font-size:14px; color:var(--text2); flex-shrink:0; width:44px; }
.form-input { flex:1; background:transparent; border:none; font-size:15px; color:var(--text1);
  outline:none; }
.form-input::placeholder { color:var(--text3); }
.form-select { flex:1; background:transparent; border:none; font-size:15px; color:var(--text1);
  outline:none; cursor:pointer; }
.xfer-row { display:none; }
.xfer-row.show { display:flex; }

/* Sheet Footer */
.sheet-footer { display:flex; gap:10px; padding:12px 20px;
  padding-bottom:calc(12px + var(--safe-b));
  border-top:1px solid var(--border); }
.btn { flex:1; padding:14px; border:none; border-radius:14px; font-size:16px;
  font-weight:600; cursor:pointer; transition:all var(--t); }
.btn:active { transform:scale(0.97); }
.btn-cancel  { background:var(--card2); color:var(--text2); }
.btn-save    { background:var(--grad); color:#fff; box-shadow:0 4px 18px rgba(102,126,234,0.4); }
.btn-danger  { background:rgba(255,107,107,0.15); color:var(--expense); }

/* ── Detail Sheet ── */
.det-row { display:flex; justify-content:space-between; align-items:center;
  padding:12px 20px; border-top:1px solid var(--border); font-size:15px; }
.det-lbl { color:var(--text3); }
.det-val { color:var(--text1); font-weight:500; }
.det-amt { font-size:20px; font-weight:700; }

/* ── Toast ── */
.toast { position:fixed; bottom:calc(var(--tab-h) + var(--safe-b) + 16px);
  left:50%; transform:translateX(-50%);
  background:rgba(30,30,50,0.95); color:#fff; padding:10px 20px; border-radius:20px;
  font-size:14px; font-weight:500; z-index:9999; white-space:nowrap;
  animation:toastIn 0.25s ease;
  box-shadow:0 4px 20px rgba(0,0,0,0.4); backdrop-filter:blur(10px); }
[data-theme="light"] .toast { background:rgba(255,255,255,0.95); color:#1A1A2E; }
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Success Animation ── */
.success-anim { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  width:80px; height:80px; border-radius:50%; background:var(--grad);
  display:flex; align-items:center; justify-content:center; z-index:9999;
  animation:successPop 0.5s ease forwards; box-shadow:0 8px 30px rgba(102,126,234,0.5); }
.success-anim svg { width:36px; height:36px; }
@keyframes successPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
  60%{transform:translate(-50%,-50%) scale(1.15)}
  80%{transform:translate(-50%,-50%) scale(0.95)}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1)}
}
.success-anim.fade-out { animation:successFade 0.4s ease forwards; }
@keyframes successFade{to{opacity:0;transform:translate(-50%,-50%) scale(1.3)}}
</style>
</head>

  {id:3,name:'老公日常',     icon:'👨',color:'#4facfe'},
  {id:4,name:'养娃基金',     icon:'👶',color:'#fa709a'},
  {id:5,name:'老婆存款',     icon:'💰',color:'#43e97b'},
  {id:6,name:'老公存款',     icon:'🏦',color:'#fee140'},
];
const BUILTIN = {
  income:  ['工资','奖金','红包','他人转账','账本间调账','其他'],
  expense: ['餐饮食品','服装鞋帽','居家日用','房租房贷','水电煤气',
            '交通出行','医疗健康','教育学习','娱乐休闲','旅游出行',
            '美容护肤','数码电子','人情往来','宠物','保险','投资理财','其他']
};
const ICONS = {
  '工资':'💼','奖金':'🎁','红包':'🧧','他人转账':'💸','账本间调账':'🔄','其他':'📌',
  '餐饮食品':'🍜','服装鞋帽':'👗','居家日用':'🏠','房租房贷':'🔑','水电煤气':'💡',
  '交通出行':'🚗','医疗健康':'💊','教育学习':'📚','娱乐休闲':'🎮','旅游出行':'✈️',
  '美容护肤':'💄','数码电子':'📱','人情往来':'🤝','宠物':'🐱','保险':'🛡️','投资理财':'📈',
};
const CAT_COLORS = [
  '#667eea','#f093fb','#4facfe','#43e97b','#fa709a','#fee140',
  '#a18cd1','#fda085','#84fab0','#fccb90','#a1c4fd','#d4fc79',
  '#43e97b','#f6d365','#96fbc4','#e0c3fc','#a8edea','#c2e9fb',
];

function iconOf(c){ return ICONS[c]||'📌'; }
function catColor(c,cats){
  const idx=(cats||[]).indexOf(c); return CAT_COLORS[idx%CAT_COLORS.length]||'#667eea';
}

// ── Utils ─────────────────────────────────────────────
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function today(){ return new Date().toISOString().slice(0,10); }
function curMonth(){ return new Date().toISOString().slice(0,7); }
function monthOf(d){ return d?d.slice(0,7):''; }
function fmtAmt(n){ return Number(n||0).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function shortAmt(n){
  const abs=Math.abs(n);
  if(abs>=100000000) return (n/100000000).toFixed(1)+'亿';
  if(abs>=10000)     return (n/10000).toFixed(1)+'万';
  return fmtAmt(n);
}
function monthLabel(ym){
  if(!ym) return '';
  const [y,m]=ym.split('-');
  return `${y}年${parseInt(m)}月`;
}
function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2800);
}
function showSuccess(){
  const el=document.createElement('div');
  el.className='success-anim';
  el.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;
  document.body.appendChild(el);
  setTimeout(()=>{ el.classList.add('fade-out'); setTimeout(()=>el.remove(),400); },600);
}

// ── Sync Status ───────────────────────────────────────
let _lastSync=null;
function setSyncing(){
  ['sync-dot','sync-dot2'].forEach(id=>{ const e=document.getElementById(id); if(e){e.className='sync-dot syncing';} });
  ['sync-label','sync-label2'].forEach(id=>{ const e=document.getElementById(id); if(e) e.textContent='同步中'; });
  const e=document.getElementById('inf-sync'); if(e) e.textContent='🟡 同步中';
}
function setSynced(){
  _lastSync=new Date();
  ['sync-dot','sync-dot2'].forEach(id=>{ const e=document.getElementById(id); if(e){e.className='sync-dot synced';} });
  ['sync-label','sync-label2'].forEach(id=>{ const e=document.getElementById(id); if(e) e.textContent='已同步'; });
  const e=document.getElementById('inf-sync'); if(e) e.textContent='🟢 已同步';
  const e2=document.getElementById('inf-time'); if(e2) e2.textContent=_lastSync.toLocaleString('zh-CN');
}
function setOffline(){
  ['sync-dot','sync-dot2'].forEach(id=>{ const e=document.getElementById(id); if(e){e.className='sync-dot offline';} });
  ['sync-label','sync-label2'].forEach(id=>{ const e=document.getElementById(id); if(e) e.textContent='离线'; });
  const e=document.getElementById('inf-sync'); if(e) e.textContent='🔴 离线';
}

// ── DB ────────────────────────────────────────────────
const LS='family_ledger_v4';
const DB={
  d:null, _t:null,
  load(){
    try{ const r=localStorage.getItem(LS); if(r){this.d=JSON.parse(r); this._migrate();} else this.reset(); }
    catch(e){ this.reset(); }
  },
  reset(){ this.d={accounts:JSON.parse(JSON.stringify(DEF_ACCOUNTS)),categories:{income:[...BUILTIN.income],expense:[...BUILTIN.expense]},transactions:[]}; },
  _migrate(){
    if(!this.d.accounts) this.d.accounts=JSON.parse(JSON.stringify(DEF_ACCOUNTS));
    if(!this.d.categories) this.d.categories={income:[...BUILTIN.income],expense:[...BUILTIN.expense]};
    if(!this.d.categories.income) this.d.categories.income=[...BUILTIN.income];
    if(!this.d.categories.expense) this.d.categories.expense=[...BUILTIN.expense];
    if(!this.d.transactions) this.d.transactions=[];
    this.d.transactions=this.d.transactions.map(t=>({
      id:t.id||uid(), accountId:Number(t.accountId)||1,
      type:t.type||'expense', category:t.category||'其他',
      amount:Number(t.amount)||0, date:t.date||today(),
      note:t.note||'', transferToAccountId:t.transferToAccountId||null,
      recordedBy:t.recordedBy||null, recordedByName:t.recordedByName||null
    }));
  },
  applyCloud(data){
    this.d={
      accounts:JSON.parse(JSON.stringify(DEF_ACCOUNTS)),
      categories:data.categories||{income:[...BUILTIN.income],expense:[...BUILTIN.expense]},
      transactions:data.transactions||[]
    };
    this._migrate(); this._local();
  },
  _local(){ try{ localStorage.setItem(LS,JSON.stringify(this.d)); }catch(e){} },
  save(){
    this._local();
    if(this._t) clearTimeout(this._t);
    setSyncing();
    this._t=setTimeout(()=>{
      docRef.set({categories:this.d.categories,transactions:this.d.transactions,updatedAt:firebase.firestore.FieldValue.serverTimestamp()})
        .then(()=>setSynced()).catch(()=>setOffline());
    },400);
  },
  acct(id){ return this.d.accounts.find(a=>a.id===id)||null; },
  balance(aid){ return this.d.transactions.filter(t=>t.accountId===aid).reduce((s,t)=>t.type==='income'?s+t.amount:s-t.amount,0); },
  stats(aid,month){
    const txs=this.d.transactions.filter(t=>(aid==null||t.accountId===aid)&&(!month||monthOf(t.date)===month));
    const income=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    return{income,expense,net:income-expense,count:txs.length};
  },
  query({aid,month,type,cat}={}){
    return this.d.transactions.filter(t=>{
      if(aid!=null&&t.accountId!==aid) return false;
      if(month&&monthOf(t.date)!==month) return false;
      if(type&&t.type!==type) return false;
      if(cat&&t.category!==cat) return false;
      return true;
    }).sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  },
  add(tx){ tx.id=uid(); this.d.transactions.push(tx); this.save(); return tx; },
  update(id,c){ const i=this.d.transactions.findIndex(t=>t.id===id); if(i>=0){this.d.transactions[i]={...this.d.transactions[i],...c}; this.save();} },
  del(id){ this.d.transactions=this.d.transactions.filter(t=>t.id!==id); this.save(); },
  months(){ return [...new Set(this.d.transactions.map(t=>monthOf(t.date)))].filter(Boolean).sort().reverse(); },
  monthsAsc(){ return this.months().slice().reverse(); }
};

// ── Theme ─────────────────────────────────────────────
function applyTheme(t){
  localStorage.setItem('theme',t);
  if(t==='dark') document.documentElement.setAttribute('data-theme','dark');
  else if(t==='light') document.documentElement.setAttribute('data-theme','light');
  else document.documentElement.removeAttribute('data-theme');
  ['theme-auto','theme-light','theme-dark'].forEach(id=>{
    const e=document.getElementById(id); if(e) e.classList.remove('active');
  });
  const map={auto:'theme-auto',light:'theme-light',dark:'theme-dark'};
  const e=document.getElementById(map[t]); if(e) e.classList.add('active');
}

// ── Boot ──────────────────────────────────────────────
function bootApp(){
  applyTheme(localStorage.getItem('theme')||'auto');
  const user=getUser();
  if(!user){
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('welcome-screen').classList.remove('hidden');
  } else {
    startApp();
  }
}

let _unsub=null, _ready=false;
function startApp(){
  DB.load();
  setSyncing();
  _unsub=docRef.onSnapshot(
    doc=>{
      if(doc.exists) DB.applyCloud(doc.data()); else DB.save();
      setSynced();
      if(!_ready){ _ready=true; _showApp(); }
      else { App.renderAll(); }
    },
    err=>{ console.error(err); setOffline(); if(!_ready){_ready=true;_showApp();toast('离线模式');} }
  );
  window.addEventListener('online', ()=>{ setSyncing(); toast('🌐 网络已恢复'); });
  window.addEventListener('offline',()=>{ setOffline(); toast('📴 网络已断开'); });
}

function _showApp(){
  App.updateUser();
  App.renderAll();
  const ld=document.getElementById('loading');
  ld.style.opacity='0';
  setTimeout(()=>{ ld.classList.add('hidden'); document.getElementById('app').style.display='flex'; },300);
}

// ── App Controller ────────────────────────────────────
const App={
  activeTab:'home', curAid:null, editId:null,
  txType:'expense', selCat:null, amtStr:'',
  statsRange:'month', statsMonth:curMonth(),

  /* ── User ── */
  updateUser(){

  /* ── Tab ── */

    document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));

  renderAll(){

  },

  /* ── Hero ── */
  renderHero(){
    const cm=curMonth();
    document.getElementById('hero-month').textContent=monthLabel(cm);
    const ms=DB.stats(this.curAid,cm);

    const net=ms.income-ms.expense;
    if(this.curAid!==null){
      const acc=DB.acct(this.curAid);

      document.getElementById('hero-amount').textContent='¥'+fmtAmt(DB.balance(this.curAid));

  },

  /* ── Accounts ── */
  renderAccounts(){
    const allBal=DB.d.accounts.reduce((s,a)=>s+DB.balance(a.id),0);
    let h=`<div class="acct-card ${this.curAid===null?'active':''}" onclick="App.selAcct(null)">
      <div class="acct-icon">📊</div>
      <div class="acct-name">全部账本</div>
      <div class="acct-bal" style="color:#667eea">¥${shortAmt(allBal)}</div>
    </div>`;
    DB.d.accounts.forEach(a=>{
      const bal=DB.balance(a.id);
      h+=`<div class="acct-card ${this.curAid===a.id?'active':''}" onclick="App.selAcct(${a.id})">
        <div class="acct-icon">${a.icon}</div>
        <div class="acct-name">${a.name}</div>
        <div class="acct-bal" style="color:${bal>=0?a.color:'var(--expense)'}">¥${shortAmt(bal)}</div>
      </div>`;
    });
    document.getElementById('accounts-scroll').innerHTML=h;
  },

  selAcct(id){
    this.curAid=id;
    this.renderAll();
    document.getElementById('content-area').scrollTo({top:0,behavior:'smooth'});
  },

  /* ── Tx List ── */
  renderTxList(){
    const month=document.getElementById('f-month')?.value||'';
    const type =document.getElementById('f-type')?.value||'';
    const cat  =document.getElementById('f-cat')?.value||'';
    const txs=DB.query({aid:this.curAid,month:month||undefined,type:type||undefined,cat:cat||undefined});
    const fc=document.getElementById('f-count'); if(fc) fc.textContent=txs.length?`共${txs.length}条`:'';
    const container=document.getElementById('txlist');
    if(txs.length===0){
      container.innerHTML=`<div class="empty-state"><div class="empty-icon">📭</div>
        <div class="empty-title">${!month&&!type&&!cat?'还没有记录':'没有符合条件的记录'}</div>
        <div class="empty-sub">${!month&&!type&&!cat?'点击底部 ＋ 开始记账':'调整筛选条件试试'}</div></div>`;
      return;
    }
    const byDate={};
    txs.forEach(t=>{ (byDate[t.date]=byDate[t.date]||[]).push(t); });
    const dates=Object.keys(byDate).sort().reverse();
    const allCats=[...DB.d.categories.income,...DB.d.categories.expense];
    let html='';
    dates.forEach(date=>{
      const grp=byDate[date];
      const dIn=grp.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
      const dOut=grp.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
      let sum='';
      if(dIn>0)  sum+=`<span class="day-in">+¥${fmtAmt(dIn)}</span>`;
      if(dOut>0) sum+=`<span class="day-out"> -¥${fmtAmt(dOut)}</span>`;
      html+=`<div class="list-section">
        <div class="list-section-header">
          <span class="list-date">${date}</span>
          <div class="list-day-summary">${sum}</div>
        </div>`;
      grp.forEach(t=>{
        const cc=catColor(t.category,allCats);
        const acc=DB.acct(t.accountId);
        const u=t.recordedBy?USERS.find(x=>x.id===t.recordedBy):null;
        let meta=[];
        if(t.note) meta.push(t.note);
        if(this.curAid===null&&acc) meta.push(acc.icon+' '+acc.name);
        html+=`<div class="tx-row" onclick="App.showDet('${t.id}')">
          <div class="tx-icon" style="background:${cc}22">${iconOf(t.category)}</div>
          <div class="tx-body">
            <div class="tx-cat">${t.category}</div>
            ${meta.length?`<div class="tx-meta">${meta.join(' · ')}</div>`:''}
          </div>
          <div class="tx-right">
            <div class="tx-amt ${t.type}">${t.type==='income'?'+':'-'}¥${fmtAmt(t.amount)}</div>
            ${u?`<div class="tx-rec">${u.emoji}</div>`:''}
          </div>
        </div>`;
      });
      html+='</div>';
    });
    container.innerHTML=html;
  },

  /* ── Filters ── */
  refreshFilters(){
    const months=DB.months();
    const fm=document.getElementById('f-month');
    if(fm){ let o='<option value="">全部月份</option>'; months.forEach(m=>{ o+=`<option value="${m}">${monthLabel(m)}</option>`; }); fm.innerHTML=o; }
    const allCats=[...DB.d.categories.income,...DB.d.categories.expense];
    const fc=document.getElementById('f-cat');
    if(fc){ let o='<option value="">全部分类</option>'; allCats.forEach(c=>{ o+=`<option value="${c}">${iconOf(c)} ${c}</option>`; }); fc.innerHTML=o; }
  },
  doFilter(){ this.renderTxList(); },

  /* ── Add/Edit TX ── */
  openAddTx(preAid){
    this.editId=null; this.amtStr=''; this.txType='expense'; this.selCat=null;
    document.getElementById('tx-title').textContent='记一笔';
    document.getElementById('tx-date').value=today();
    document.getElementById('tx-note').value='';

  _renderAcctSel(selId){
    document.getElementById('tx-acct').innerHTML=DB.d.accounts.map(a=>`<option value="${a.id}" ${a.id===selId?'selected':''}>${a.icon} ${a.name}</option>`).join('');

  },
  _renderXferSel(fromId){
    document.getElementById('xfer-to').innerHTML=DB.d.accounts.filter(a=>a.id!==fromId).map(a=>`<option value="${a.id}">${a.icon} ${a.name}</option>`).join('');

  onAcctChange(){ const id=parseInt(document.getElementById('tx-acct').value); this._renderXferSel(id); },

  setType(t){
    this.txType=t; this.selCat=null;
    this._applyType(t);
    document.getElementById('xfer-row').classList.remove('show');
  },
  _applyType(t){
    ['t-income','t-expense'].forEach(id=>{ const e=document.getElementById(id); if(e) e.classList.remove('active'); });
    const e=document.getElementById('t-'+t); if(e) e.classList.add('active');

    const cats=this.txType==='income'?DB.d.categories.income:DB.d.categories.expense;
    const allCats=[...DB.d.categories.income,...DB.d.categories.expense];
    document.getElementById('cat-scroll').innerHTML=cats.map(c=>{
      const cc=catColor(c,allCats);
      return `<div class="cat-chip ${this.selCat===c?'sel':''}" onclick="App.pickCat('${c.replace(/'/g,"\\'")}')">
        <div class="cat-chip-icon" style="background:${cc}33;${this.selCat===c?`border-color:${cc}`:''}">
          <span style="${this.selCat===c?`color:${cc}`:'filter:none'}">${iconOf(c)}</span>
        </div>
        <div class="cat-chip-name">${c}</div>
      </div>`;
    }).join('');

    this.selCat=c;
    this._renderCatScroll();
    const isXfer=c==='账本间调账'&&this.txType==='expense';
    document.getElementById('xfer-row').classList.toggle('show',isXfer);
  },

  /* ── Numpad ── */
  kp(ch){
    if(ch==='.'){ if(this.amtStr.includes('.')) return; if(!this.amtStr) this.amtStr='0'; }
    if(this.amtStr==='0'&&ch!=='.') this.amtStr=ch;
    else this.amtStr+=ch;
    const pts=this.amtStr.split('.');
    if(pts[1]&&pts[1].length>2) this.amtStr=pts[0]+'.'+pts[1].slice(0,2);
    if(pts[0]&&pts[0].length>9) this.amtStr=pts[0].slice(0,9)+(pts[1]!==undefined?'.'+pts[1]:'');
    this._updateAmt();
  },
  kpDel(){ this.amtStr=this.amtStr.slice(0,-1); this._updateAmt(); },
  kpClear(){ this.amtStr=''; this._updateAmt(); },
  kpOk(){
    document.getElementById('form-section').scrollIntoView({behavior:'smooth',block:'nearest'});
  },
  _updateAmt(){
    const el=document.getElementById('amt-num'); if(el) el.textContent=this.amtStr||'0';
    const d=document.getElementById('amt-display');
    if(d) d.className='amt-display '+this.txType+(this.amtStr?' has-val':'');
  },

  /* ── Save TX ── */
  saveTx(){
    const amount=parseFloat(this.amtStr);
    if(!amount||amount<=0){ toast('⚠️ 请输入有效金额'); return; }
    if(!this.selCat){ toast('⚠️ 请选择分类'); return; }
    const date=document.getElementById('tx-date').value;
    if(!date){ toast('⚠️ 请选择日期'); return; }
    const acctId=parseInt(document.getElementById('tx-acct').value);
    const note=document.getElementById('tx-note').value.trim();
    const isXfer=this.selCat==='账本间调账'&&this.txType==='expense';
    let xferTo=null;
    if(isXfer){
      xferTo=parseInt(document.getElementById('xfer-to').value);
      if(xferTo===acctId){ toast('⚠️ 转出和转入不能相同'); return; }
    }
    const u=getUser();
    const base={accountId:acctId,type:this.txType,category:this.selCat,amount,date,note,
      transferToAccountId:xferTo,recordedBy:u?.id||null,recordedByName:u?.name||null};
    if(this.editId){ DB.update(this.editId,base); }
    else {
      const tx=DB.add(base);
      if(isXfer&&xferTo){
        const fromAcc=DB.acct(acctId), toAcc=DB.acct(xferTo);
        DB.add({accountId:xferTo,type:'income',category:'账本间调账',amount,date,
          note:`从「${fromAcc?.name}」调入${note?' · '+note:''}`,
          transferToAccountId:null,linkedId:tx.id,recordedBy:u?.id||null,recordedByName:u?.name||null});
        toast(`✅ 已调账至「${toAcc?.name}」`);
      }
    }
    this.closeTx();
    showSuccess();
    this.renderAll();
    setTimeout(()=>{ this.refreshFilters(); },100);
  },

  /* ── Detail ── */
  showDet(txId){
    const tx=DB.d.transactions.find(t=>t.id===txId); if(!tx) return;
    this.editId=txId;
    const acc=DB.acct(tx.accountId);
    const u=tx.recordedBy?USERS.find(x=>x.id===tx.recordedBy):null;
    const amtColor=tx.type==='income'?'var(--income)':'var(--expense)';
    document.getElementById('det-body').innerHTML=`
      <div class="det-row"><span class="det-lbl">类型</span><span class="det-val">${tx.type==='income'?'💚 收入':'❤️ 支出'}</span></div>
      <div class="det-row"><span class="det-lbl">金额</span><span class="det-amt" style="color:${amtColor}">${tx.type==='income'?'+':'-'}¥${fmtAmt(tx.amount)}</span></div>
      <div class="det-row"><span class="det-lbl">分类</span><span class="det-val">${iconOf(tx.category)} ${tx.category}</span></div>
      <div class="det-row"><span class="det-lbl">账本</span><span class="det-val">${acc?acc.icon+' '+acc.name:'已删除'}</span></div>
      <div class="det-row"><span class="det-lbl">日期</span><span class="det-val">${tx.date}</span></div>
      <div class="det-row"><span class="det-lbl">备注</span><span class="det-val">${tx.note||'—'}</span></div>
      ${u?`<div class="det-row"><span class="det-lbl">记账人</span><span class="det-val">${u.emoji} ${u.name}</span></div>`:''}`;
    document.getElementById('det-overlay').classList.remove('hidden');
  },
  closeDet(){ document.getElementById('det-overlay').classList.add('hidden'); this.editId=null; },
  deleteTx(){
    if(!this.editId) return;
    if(!confirm('确定删除这条记录吗？')) return;
    DB.del(this.editId); this.closeDet(); this.renderAll(); toast('已删除');
  },
  editTx(){
    const tx=DB.d.transactions.find(t=>t.id===this.editId); if(!tx) return;
    this.closeDet();
    this.amtStr=String(tx.amount); this.txType=tx.type; this.selCat=tx.category;
    document.getElementById('tx-title').textContent='编辑记录';
    document.getElementById('tx-date').value=tx.date;
    document.getElementById('tx-note').value=tx.note||'';
    this._renderAcctSel(tx.accountId);
    this._applyType(tx.type);
    this.selCat=tx.category; this._renderCatScroll(); this._updateAmt();
    const isXfer=tx.category==='账本间调账'&&tx.type==='expense';
    if(isXfer){ document.getElementById('xfer-row').classList.add('show'); }
    document.getElementById('tx-overlay').classList.remove('hidden');
  },

  /* ── Stats ── */
  renderStats(){
    const txs=this._filterTxs();
    const income=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const net=income-expense;
    // month nav visibility
    const nav=document.getElementById('stats-month-nav');
    if(nav) nav.style.display=this.statsRange==='month'?'flex':'none';
    document.getElementById('stats-month-label').textContent=monthLabel(this.statsMonth);
    document.getElementById('stats-trio').innerHTML=`
      <div class="stats-trio-item"><div class="stats-trio-label">收入</div><div class="stats-trio-val green">¥${shortAmt(income)}</div></div>
      <div class="stats-trio-item"><div class="stats-trio-label">支出</div><div class="stats-trio-val red">¥${shortAmt(expense)}</div></div>
      <div class="stats-trio-item"><div class="stats-trio-label">结余</div><div class="stats-trio-val" style="color:${net>=0?'#A0FFE6':'#FFB3B3'}">¥${shortAmt(net)}</div></div>`;
    this._renderDonut(txs);
    this._renderLine();
    this._renderRank(txs);
  },
  setRange(r,el){
    this.statsRange=r;
    document.querySelectorAll('.stats-range-tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    this.statsMonth=curMonth();
    this.renderStats();
  },
  prevMonth(){
    const [y,m]=this.statsMonth.split('-').map(Number);
    const d=new Date(y,m-2,1);
    this.statsMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    this.renderStats();
  },
  nextMonth(){
    const [y,m]=this.statsMonth.split('-').map(Number);
    const d=new Date(y,m,1);
    this.statsMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    this.renderStats();
  },
  _filterTxs(){
    const all=DB.d.transactions;
    if(this.statsRange==='month') return all.filter(t=>monthOf(t.date)===this.statsMonth);
    if(this.statsRange==='year')  return all.filter(t=>t.date.slice(0,4)===new Date().getFullYear().toString());
    return all;
  },

  _renderDonut(txs){
    const el=document.getElementById('donut-wrap');
    const exps=txs.filter(t=>t.type==='expense');
    const total=exps.reduce((s,t)=>s+t.amount,0);
    if(total===0){ el.innerHTML='<div style="color:var(--text3);font-size:14px;padding:8px 0">暂无支出数据</div>'; return; }
    const map={}; exps.forEach(t=>{ map[t.category]=(map[t.category]||0)+t.amount; });
    const cats=Object.entries(map).sort((a,b)=>b[1]-a[1]);
    // Canvas donut
    const S=140,cx=70,cy=70,ro=60,ri=38;
    const canvas=document.createElement('canvas');
    canvas.width=S*2; canvas.height=S*2; canvas.style.width=S+'px'; canvas.style.height=S+'px';
    const ctx=canvas.getContext('2d');
    ctx.scale(2,2);
    let angle=-Math.PI/2;
    cats.forEach(([name,val],i)=>{
      const slice=(val/total)*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,ro,angle,angle+slice);
      ctx.closePath();
      ctx.fillStyle=PALETTE[i%PALETTE.length];
      ctx.fill();
      angle+=slice;
    });
    // inner hole
    ctx.beginPath(); ctx.arc(cx,cy,ri,0,Math.PI*2);
    // Use a dynamic color based on theme for inner circle
    const isDark=document.documentElement.getAttribute('data-theme')==='dark'||
      (!document.documentElement.getAttribute('data-theme')&&window.matchMedia('(prefers-color-scheme: dark)').matches);
    ctx.fillStyle=isDark?'#1A1A2E':'#FFFFFF';
    ctx.fill();
    // legend
    let legend='';
    cats.slice(0,6).forEach(([name,val],i)=>{
      const pct=((val/total)*100).toFixed(1);
      legend+=`<div class="legend-item">
        <div class="legend-dot" style="background:${PALETTE[i%PALETTE.length]}"></div>
        <span class="legend-name">${name}</span>
        <span class="legend-pct">${pct}%</span>
      </div>`;
    });
    el.innerHTML=`<div class="donut-wrap">
      <div class="donut-canvas-wrap">
        ${canvas.outerHTML}
        <div class="donut-center">
          <div class="donut-center-label">支出</div>
          <div class="donut-center-val">¥${shortAmt(total)}</div>
        </div>
      </div>
      <div class="donut-legend">${legend}</div>
    </div>`;
    // Re-draw canvas (since outerHTML doesn't preserve canvas content)
    const c2=el.querySelector('canvas');
    if(c2){
      c2.width=S*2; c2.height=S*2;
      const ctx2=c2.getContext('2d'); ctx2.scale(2,2);
      let a2=-Math.PI/2;
      cats.forEach(([,val],i)=>{
        const slice=(val/total)*Math.PI*2;
        ctx2.beginPath(); ctx2.moveTo(cx,cy); ctx2.arc(cx,cy,ro,a2,a2+slice); ctx2.closePath();
        ctx2.fillStyle=PALETTE[i%PALETTE.length]; ctx2.fill(); a2+=slice;
      });
      ctx2.beginPath(); ctx2.arc(cx,cy,ri,0,Math.PI*2);
      ctx2.fillStyle=isDark?'#1A1A2E':'#FFFFFF'; ctx2.fill();
    }
  },

  _renderLine(){
    const el=document.getElementById('line-chart');
    const months=DB.monthsAsc().slice(-12);
    if(months.length===0){ el.innerHTML='<div style="color:var(--text3);font-size:14px;padding:8px 0">暂无数据</div>'; return; }
    const all=DB.d.transactions;
    const pts=months.map(m=>({
      m,
      inc:all.filter(t=>t.type==='income'&&monthOf(t.date)===m).reduce((s,t)=>s+t.amount,0),
      exp:all.filter(t=>t.type==='expense'&&monthOf(t.date)===m).reduce((s,t)=>s+t.amount,0)
    }));
    const maxV=Math.max(...pts.map(p=>Math.max(p.inc,p.exp)),1);
    const colW=64, W=Math.max(months.length*colW+60,300), H=160;
    const pL=44,pR=16,pT=16,pB=36,cW=W-pL-pR,cH=H-pT-pB;
    const xp=i=>pL+(i/(pts.length-1||1))*cW;
    const yp=v=>pT+cH-(v/maxV)*cH;
    let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible">`;
    // Grid lines
    [0,0.25,0.5,0.75,1].forEach(p=>{
      const y=pT+cH*(1-p), v=maxV*p;
      const l=v>=10000?(v/10000).toFixed(1)+'万':Math.round(v);
      svg+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
            <text x="${pL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="rgba(255,255,255,0.3)">${l}</text>`;
    });
    // Area + lines
    let iPath='',ePath='';
    pts.forEach((d,i)=>{ iPath+=(i?` L${xp(i)},${yp(d.inc)}`:`M${xp(i)},${yp(d.inc)}`); ePath+=(i?` L${xp(i)},${yp(d.exp)}`:`M${xp(i)},${yp(d.exp)}`); });
    const firstX=xp(0),lastX=xp(pts.length-1),baseY=pT+cH;
    svg+=`<defs>
      <linearGradient id="ig" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00D4AA" stop-opacity="0.3"/><stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/></linearGradient>
    </defs>
    <path d="${iPath} L${lastX},${baseY} L${firstX},${baseY} Z" fill="url(#ig)"/>
    <path d="${iPath}" fill="none" stroke="#00D4AA" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="${ePath}" fill="none" stroke="#FF6B6B" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    pts.forEach((d,i)=>{
      const x=xp(i);
      svg+=`<circle cx="${x}" cy="${yp(d.inc)}" r="4" fill="#00D4AA" stroke="var(--card)" stroke-width="2"/>
            <circle cx="${x}" cy="${yp(d.exp)}" r="4" fill="#FF6B6B" stroke="var(--card)" stroke-width="2"/>
            <text x="${x}" y="${H-pB+14}" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.4)">${d.m.slice(5)}月</text>`;
    });
    svg+=`<rect x="${pL}" y="4" width="10" height="6" fill="#00D4AA" rx="1"/>
          <text x="${pL+14}" y="11" font-size="9" fill="rgba(255,255,255,0.5)">收入</text>
          <rect x="${pL+44}" y="4" width="10" height="6" fill="#FF6B6B" rx="1"/>
          <text x="${pL+58}" y="11" font-size="9" fill="rgba(255,255,255,0.5)">支出</text>`;
    svg+='</svg>';
    el.innerHTML=svg;
  },

  _renderRank(txs){
    const el=document.getElementById('rank-list');
    const allCats=[...DB.d.categories.income,...DB.d.categories.expense];
    const exps=txs.filter(t=>t.type==='expense');
    if(exps.length===0){ el.innerHTML='<div style="color:var(--text3);font-size:14px">暂无支出数据</div>'; return; }
    const map={}; exps.forEach(t=>{ map[t.category]=(map[t.category]||0)+t.amount; });
    const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]);
    const maxVal=sorted[0][1];
    el.innerHTML=sorted.slice(0,8).map(([cat,val],i)=>{
      const pct=(val/maxVal*100).toFixed(0);
      const cc=PALETTE[i%PALETTE.length];
      return `<div class="rank-item">
        <div class="rank-icon" style="background:${cc}22">${iconOf(cat)}</div>
        <div class="rank-body">
          <div class="rank-name">${cat}</div>
          <div class="rank-bar-track"><div class="rank-bar-fill" style="width:${pct}%;background:${cc}"></div></div>
        </div>
        <div class="rank-val">¥${shortAmt(val)}</div>
      </div>`;
    }).join('');
  },

  /* ── Me / Settings ── */
  renderCatTags(){
    ['income','expense'].forEach(type=>{
      const el=document.getElementById(type+'-tags'); if(!el) return;
      const builtins=BUILTIN[type];
      el.innerHTML=DB.d.categories[type].map(c=>{
        const isBI=builtins.includes(c);
        return `<span class="cat-tag ${type}-tag">
          <span class="tag-dot"></span>${iconOf(c)} ${c}
          ${!isBI?`<button class="tag-del" onclick="App.delCat('${type}','${c.replace(/'/g,"\\'")}')">×</button>`:''}
        </span>`;
      }).join('');
    });
  },
  addCat(type){
    const inputId='add-'+type; const name=document.getElementById(inputId)?.value.trim();
    if(!name){ toast('请输入分类名'); return; }
    if(DB.d.categories[type].includes(name)){ toast('该分类已存在'); return; }
    DB.d.categories[type].push(name); DB.save();
    document.getElementById(inputId).value='';
    this.renderCatTags(); toast(`✅ 已添加「${name}」`);
  },
  delCat(type,name){
    if(BUILTIN[type].includes(name)){ toast('内置分类不可删除'); return; }
    if(!confirm(`删除分类「${name}」？`)) return;
    DB.d.categories[type]=DB.d.categories[type].filter(c=>c!==name);
    DB.save(); this.renderCatTags(); toast('已删除分类');
  },
  updateInfoPanel(){
    const e=document.getElementById('inf-count'); if(e) e.textContent=DB.d.transactions.length+'条';
    const e2=document.getElementById('inf-time'); if(e2&&_lastSync) e2.textContent=_lastSync.toLocaleString('zh-CN');
  },

  /* ── Export ── */
  exportExcel(){
    if(typeof XLSX==='undefined'){ toast('❌ Excel库未加载'); return; }
    toast('⏳ 生成Excel中…');
    const wb=XLSX.utils.book_new(), cm=curMonth();
    const rows0=[['家庭账本 iCost版'],['导出:'+new Date().toLocaleString('zh-CN')],[],['账本','余额','收入','支出','笔数','本月收入','本月支出']];
    DB.d.accounts.forEach(a=>{
      const all=DB.stats(a.id,null), mth=DB.stats(a.id,cm);
      rows0.push([a.icon+' '+a.name, all.income-all.expense, all.income, all.expense, all.count, mth.income, mth.expense]);
    });
    const ws0=XLSX.utils.aoa_to_sheet(rows0); ws0['!cols']=[{wch:16},{wch:12},{wch:12},{wch:12},{wch:8},{wch:12},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws0,'汇总');
    DB.d.accounts.forEach(a=>{
      const txs=DB.query({aid:a.id});
      const rows=[[a.icon+' '+a.name],[],[' 序号','日期','类型','分类','金额','备注','记账人']];
      txs.sort((a,b)=>b.date.localeCompare(a.date)).forEach((t,i)=>{
        rows.push([i+1,t.date,t.type==='income'?'收入':'支出',t.category,t.type==='income'?t.amount:-t.amount,t.note||'',t.recordedByName||'']);
      });
      const ws=XLSX.utils.aoa_to_sheet(rows); ws['!cols']=[{wch:6},{wch:12},{wch:8},{wch:14},{wch:12},{wch:30},{wch:8}];
      XLSX.utils.book_append_sheet(wb,ws,a.name.slice(0,28));
    });
    XLSX.writeFile(wb,'家庭账本_'+today()+'.xlsx');
    setTimeout(()=>toast('✅ Excel已导出'),500);
  },
  exportJSON(){
    const blob=new Blob([JSON.stringify(DB.d,null,2)],{type:'application/json;charset=utf-8'});
    const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:'家庭账本备份_'+today()+'.json'});
    a.click(); URL.revokeObjectURL(a.href); toast('✅ JSON备份已导出');
  },
  triggerImport(){ document.getElementById('import-input').click(); },
  importJSON(evt){
    const f=evt.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!Array.isArray(data.transactions)) throw new Error('格式无效');
        if(!confirm(`导入 ${data.transactions.length} 条记录？\n⚠️ 将覆盖当前所有数据`)) return;
        DB.d=data; DB.save(); this.renderAll(); toast('✅ 导入成功');
      }catch(err){ toast('❌ 导入失败: '+err.message); }
    }; r.readAsText(f); evt.target.value='';
  },
  clearAll(){
    if(!confirm('⚠️ 确定清空所有数据？此操作不可恢复！')) return;
    if(!confirm('🚨 再次确认：永久清空（含云端）？')) return;
    DB.reset(); DB.save(); this.curAid=null; this.renderAll(); toast('已清空');
  }
};

// ── Init ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  if(sessionStorage.getItem('auth')==='1') bootApp();
  // else password screen is already visible

  document.getElementById('tx-overlay').addEventListener('click',function(e){ if(e.target===this) App.closeTx(); });
  document.getElementById('det-overlay').addEventListener('click',function(e){ if(e.target===this) App.closeDet(); });
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){ App.closeTx(); App.closeDet(); }
  });
  document.getElementById('add-income').addEventListener('keydown',e=>{ if(e.key==='Enter') App.addCat('income'); });
  document.getElementById('add-expense').addEventListener('keydown',e=>{ if(e.key==='Enter') App.addCat('expense'); });
});

window.APP={DB,App,USERS,PALETTE};
console.log('iCost UI ready, features:', Object.keys(window.APP).join(', '));
</script>
